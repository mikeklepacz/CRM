app = "hemp-voice-proxy"
primary_region = "iad"

[build]

# Use [[services]] format for proper WebSocket support
# WebSocket upgrades require HTTP/1.1, not HTTP/2
[[services]]
  internal_port = 8080
  protocol = "tcp"
  
  # HTTP port (redirects to HTTPS)
  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true
  
  # HTTPS port - TLS terminated at edge, app receives plain HTTP
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
  
  # Connection-based concurrency for WebSocket
  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50
  
  # Health check
  [[services.http_checks]]
    interval = 10000
    grace_period = "5s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = 2000

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
