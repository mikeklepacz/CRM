app = "hemp-voice-proxy"
primary_region = "iad"

[build]

# Use [[services]] format for WebSocket support
# This is the recommended approach for WebSocket apps
[[services]]
  internal_port = 8080
  protocol = "tcp"
  
  # HTTP port (redirects to HTTPS)
  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true
  
  # HTTPS port - use http handler for WebSocket upgrades
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
  
  # Connection-based concurrency for WebSocket
  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50
  
  # Disable HTTP/2 backend - WebSockets require HTTP/1.1
  [services.http_options]
    h2_backend = false
  
  # Health check using tcp_checks for reliability
  [[services.tcp_checks]]
    interval = "10s"
    grace_period = "5s"
    timeout = "2s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
