app = "hemp-voice-proxy"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# WebSocket support
[http_service.concurrency]
  type = "connections"
  hard_limit = 100
  soft_limit = 50

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
