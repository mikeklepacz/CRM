app = "hemp-voice-proxy"
primary_region = "iad"

[build]

# Use [http_service] for WebSocket support
# Fly.io handles WebSocket upgrades correctly with this approach
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  
  # CRITICAL: Enable WebSocket proxying for Twilio streams
  websocket = true
  
  # Disable HTTP/2 backend - WebSockets require HTTP/1.1
  [http_service.http_options]
    h2_backend = false
  
  # Connection-based concurrency for WebSocket
  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

# Health check configuration
[[http_service.checks]]
  interval = "10s"
  grace_period = "5s"
  method = "get"
  path = "/health"
  protocol = "http"
  timeout = "2s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
